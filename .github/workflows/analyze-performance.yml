name: Analyze Threads Post Performance

on:
  schedule:
    # Setiap hari Minggu jam 07:00 WIB (00:00 UTC)
    - cron: '0 0 * * 0'
  
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze-performance:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r autopost/requirements.txt

      - name: Run performance analysis
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python autopost/analyze_performance.py

      - name: Commit updated tracker and report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add autopost/tracker.json autopost/performance_report.md
          git diff --staged --quiet || git commit -m "chore: update post performance report [skip ci]"
          git push
