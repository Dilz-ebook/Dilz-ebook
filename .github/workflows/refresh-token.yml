name: Refresh Threads Token

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh long-lived token
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          echo "::add-mask::$THREADS_ACCESS_TOKEN"
          RESP=$(curl -s "https://graph.threads.net/refresh_access_token?grant_type=th_refresh_token&access_token=$THREADS_ACCESS_TOKEN")
          echo "Raw response (token masked):"
          echo "$RESP" | jq -c '. | .access_token = "***MASKED***"'
          NEW_TOKEN=$(echo "$RESP" | jq -r '.access_token // empty')
          if [ -z "$NEW_TOKEN" ]; then
            echo "::error::Refresh gagal. Token kemungkinan expired total. Regenerate manual di Meta Developer Portal."
            echo "$RESP"
            exit 1
          fi
          echo "::set-output name=new_token::$NEW_TOKEN"
          echo ""
          echo "=== TOKEN BARU (copy semua, set secret via: gh secret set THREADS_ACCESS_TOKEN -b '<paste>') ==="
          echo "NEW_TOKEN_BELOW"
          echo "$NEW_TOKEN"
